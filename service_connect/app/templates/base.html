<!DOCTYPE html>
<html>
<head>
    <title>ServiceConnect</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        /* HEADER */
        .main-header {
            background: linear-gradient(90deg, #2196F3, #0D47A1);
            color: white;
            padding: 15px 30px;
        }

        /* FOOTER */
        .main-footer {
            background-color: #0D47A1;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }

        /* CONTENT */
        .container {
            padding: 20px 30px;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="main-header">
    <h1>ServiceConnect</h1>

    <nav>
        <a href="{% url 'dashboard' %}" style="color:white; margin-left:20px;">Dashboard</a>
        <a href="{% url 'contact' %}" style="color:white; margin-left:20px;">Contact</a>

        {% if user.is_authenticated %}
            <a href="{% url 'logout' %}" style="color:white; margin-left:20px;">Logout</a>
        {% endif %}
    </nav>
</header>

    <!-- PAGE CONTENT -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <!-- FOOTER -->
    <footer class="main-footer">
        <p>&copy; 2026 ServiceConnect</p>
    </footer>

</body>
</html>
